<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Virtual Character Sheet - Password</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel='stylesheet' type='text/css' media='screen' href='style/default.css'>
    <script src='scripts/common.js'></script>
    <style>
        
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <h1>Virtual Character Sheet - Password Set</h1>
        </div>
        <div class="row">
            <h3>Password</h3>
            <input type="password" id="password">
            <button type="button" id="toggleBtn" aria-label="Toggle password visibility">Show</button>
            <button type="button" onclick="save()">Save</button>
        </div>
        <a href=".">Index</a>
    </div>
    
    <script>
        const inputEl = document.getElementById('password')
        inputEl.value = localStorage.getItem('vcs_password') ?? ''
        function save() {
            localStorage.setItem('vcs_password', inputEl.value)
        }

        const toggleBtn = document.getElementById('toggleBtn');

        toggleBtn.addEventListener('click', () => {
        // Toggle the type attribute
        const type = inputEl.getAttribute('type') === 'password' ? 'text' : 'password';
        inputEl.setAttribute('type', type);
        
        // Toggle the button text or icon
        toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
