<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Virtual Character Sheet</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel='stylesheet' type='text/css' media='screen' href='style/default.css'>
    <script src='scripts/common.js'></script>
    <style>
        
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <h1>Virtual Character Sheet</h1>
        </div>
        <div class="row">
            <h3>Characters</h3>
            <ul id="characterList"></ul>
        </div>
        <div class="row">
            <h3>Local Characters</h3>
            <ul id="characterListLocal"></ul>
        </div>
    </div>
    
    <script>
        const characters = $characters$;
        let listEl = document.getElementById('characterList')
        characters.forEach(char => {
            const el = document.createElement('li')
            listEl.appendChild(el)
            const a = document.createElement('a')
            el.appendChild(a)
            a.textContent = char.charAt(0).toUpperCase() + char.slice(1)
            a.href = `/character?id=${char}`
            a.classList.add('inline')
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
